<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foodi</title>
</head>

<body class="wrapper active">
    <section class="header">
        <div class="header__container">
            <div class="header__logo">
                <img src="image/logo.png" alt="logo">
            </div>

            <div class="header__menu menu">
                <ul class="menu__list">
                    <li class="menu__item active">
                        <a class="menu__link" href="#">Home</a>
                    </li>
                    <li class="menu__item">
                        <a class="menu__link" href="#">Pages</a>
                    </li>
                    <li class="menu__item">
                        <a class="menu__link" href="#">Menu</a>
                    </li>
                    <li class="menu__item">
                        <a class="menu__link" href="#">Order</a>
                    </li>
                    <li class="menu__item">
                        <a class="menu__link" href="#">Blog</a>
                    </li>
                    <li class="menu__item">
                        <a class="menu__link" href="#">Contact</a>
                    </li>

                </ul>
                <div class="menu__burger">
                    <svg display="none">
                        <symbol id="burger" viewBox="0 0 20 20">
                            <g version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg"
                                xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 20 20" xml:space="preserve">
                                <path d="M19,5H1C0.4,5,0,4.6,0,4s0.4-1,1-1h18c0.6,0,1,0.4,1,1S19.6,5,19,5z" />
                                <path d="M10,11H1c-0.6,0-1-0.4-1-1s0.4-1,1-1h9c0.6,0,1,0.4,1,1S10.6,11,10,11z" />
                                <path d="M19,17H1c-0.6,0-1-0.4-1-1s0.4-1,1-1h18c0.6,0,1,0.4,1,1S19.6,17,19,17z" />
                            </g>
                        </symbol>
                    </svg>
                    <svg class="icon">
                        <use xlink:href="#burger"></use>
                    </svg>
                </div>
                <a class="header__button button" href="#">RESERVATION</a>
            </div>

        </div>
    </section>
    <section class="hero">
        <div class="hero__container">
            <div class="hero__content">
                <div class="hero__untitle">HELLO, NEW FRIEND</div>
                <div class="hero__title">RESERVE YOUR TABLE</div>
                <div class="hero__btns">
                    <a class="hero__button--br button" href="#">BOOK A TABLE</a>
                    <a class="hero__button button" href="#">OPEN MENU</a>

                </div>

            </div>
            <img class="hero-image" src="image/hero/hero.webp" alt="hero-image">
        </div>

    </section>
</body>

</html>
<script src="js/script.js"></script>
